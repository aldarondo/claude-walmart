services:
  claude-walmart:
    image: ghcr.io/aldarondo/claude-walmart:latest
    container_name: claude-walmart
    restart: unless-stopped
    environment:
      - WALMART_API_KEY=${WALMART_API_KEY}
      - PORT=${PORT:-8772}
    volumes:
      - ./logs:/app/logs
    command: sh -c "node src/serve.js 2>&1 | tee -a /app/logs/app.log"
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
