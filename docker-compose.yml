services:
  claude-walmart:
    image: node:20-alpine
    container_name: claude-walmart
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - WALMART_API_KEY=${WALMART_API_KEY}
      - PORT=${PORT:-8772}
    command: node src/serve.js
    network_mode: host
